<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小游戏合集</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f0e8;
      --ink: #1e2528;
      --muted: #647078;
      --panel: #fffaf0;
      --line: #d7cab8;
      --red: #b73535;
      --jade: #18856e;
      --gold: #d8a73f;
      --shadow: 0 18px 55px rgba(36, 30, 22, .14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(183, 53, 53, .08), transparent 35%),
        linear-gradient(315deg, rgba(24, 133, 110, .10), transparent 38%),
        var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
    }

    main {
      width: min(920px, 100%);
      display: grid;
      gap: 22px;
    }

    header {
      display: grid;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 6vw, 58px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .game-card {
      min-height: 240px;
      display: grid;
      align-content: space-between;
      gap: 22px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      color: inherit;
      text-decoration: none;
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }

    .game-card:hover {
      transform: translateY(-3px);
      border-color: #b8a486;
      box-shadow: 0 22px 65px rgba(36, 30, 22, .18);
    }

    .tile-preview {
      display: grid;
      grid-template-columns: repeat(4, 42px);
      gap: 8px;
      min-height: 96px;
      align-content: start;
    }

    .tile {
      width: 42px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1px solid #c8b99f;
      border-radius: 7px;
      background: #fffdf7;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, .06);
      font-weight: 800;
    }

    .red {
      color: var(--red);
    }

    .green {
      color: var(--jade);
    }

    .gold {
      color: #9a6f12;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0;
    }

    .action {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 8px;
      background: var(--ink);
      color: #fffaf0;
      font-weight: 800;
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
        align-items: start;
      }

      .games {
        grid-template-columns: 1fr;
      }

      .game-card {
        min-height: 210px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>小游戏合集</h1>
      <p>选一个小游戏开始。所有内容都在本地运行，可以直接打开页面游玩。</p>
    </header>

    <section class="games" aria-label="游戏列表">
      <a class="game-card" href="lianliankan.html">
        <div class="tile-preview" aria-hidden="true">
          <span class="tile red">中</span>
          <span class="tile green">發</span>
          <span class="tile gold">九</span>
          <span class="tile red">萬</span>
          <span class="tile green">竹</span>
          <span class="tile red">東</span>
        </div>
        <div>
          <h2>连连看</h2>
          <p>麻将牌风格，最多两次转弯连线消除。</p>
        </div>
        <span class="action">开始游戏</span>
      </a>

      <a class="game-card" href="snake.html">
        <div class="tile-preview" aria-hidden="true">
          <span class="tile green">●</span>
          <span class="tile green">●</span>
          <span class="tile green">●</span>
          <span class="tile gold">◆</span>
        </div>
        <div>
          <h2>贪吃蛇</h2>
          <p>保留现有版本，从合集入口进入。</p>
        </div>
        <span class="action">打开游戏</span>
      </a>
    </section>
  </main>
</body>
</html>
