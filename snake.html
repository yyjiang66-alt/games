<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>贪吃蛇</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: #1a1f27;
      --panel-2: #202734;
      --text: #f4f7fb;
      --muted: #aab4c3;
      --line: #303846;
      --green: #45d483;
      --green-dark: #1b9e57;
      --food: #ffcf45;
      --danger: #ff6b6b;
      --blue: #64b5ff;
      --shadow: 0 18px 60px rgba(0, 0, 0, .38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(69, 212, 131, .13), transparent 30%),
        radial-gradient(circle at bottom right, rgba(100, 181, 255, .12), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    .game {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: minmax(320px, 560px) minmax(260px, 1fr);
      gap: 18px;
      align-items: stretch;
    }

    .board-wrap,
    .side {
      background: rgba(26, 31, 39, .92);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .board-wrap {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      min-height: 44px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 40px);
      line-height: 1;
      letter-spacing: 0;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      text-align: right;
      min-width: 128px;
    }

    canvas {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #0b0f14;
      border: 1px solid #2a3341;
      border-radius: 8px;
      image-rendering: pixelated;
    }

    .side {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat {
      min-height: 78px;
      padding: 12px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      align-content: center;
      gap: 6px;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
    }

    .value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 44px;
      padding: 0 14px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: #516276;
      background: #263140;
    }

    button:active {
      transform: translateY(0);
    }

    .primary {
      border-color: rgba(69, 212, 131, .55);
      background: linear-gradient(180deg, var(--green), var(--green-dark));
      color: #07120c;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .pad {
      display: none;
      grid-template-columns: repeat(3, 58px);
      grid-template-rows: repeat(3, 48px);
      justify-content: center;
      gap: 8px;
      margin-top: auto;
    }

    .pad button {
      min-height: 48px;
      padding: 0;
      font-size: 22px;
    }

    .pad .up {
      grid-column: 2;
    }

    .pad .left {
      grid-column: 1;
      grid-row: 2;
    }

    .pad .right {
      grid-column: 3;
      grid-row: 2;
    }

    .pad .down {
      grid-column: 2;
      grid-row: 3;
    }

    .tips {
      color: var(--muted);
      line-height: 1.65;
      margin: 0;
      font-size: 14px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(8, 10, 14, .68);
      backdrop-filter: blur(4px);
    }

    .overlay.show {
      display: grid;
    }

    .dialog {
      width: min(360px, 100%);
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .dialog h2 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    .dialog p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      body {
        padding: 12px;
        align-items: start;
      }

      .game {
        grid-template-columns: 1fr;
      }

      .side {
        gap: 12px;
      }

      .pad {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main class="game" aria-label="贪吃蛇游戏">
    <section class="board-wrap">
      <div class="topbar">
        <h1>贪吃蛇</h1>
        <div class="status" id="status">按开始进入游戏</div>
      </div>
      <canvas id="board" width="600" height="600" aria-label="游戏棋盘"></canvas>
    </section>

    <aside class="side">
      <div class="stats">
        <div class="stat">
          <div class="label">分数</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="stat">
          <div class="label">最高分</div>
          <div class="value" id="best">0</div>
        </div>
        <div class="stat">
          <div class="label">速度</div>
          <div class="value" id="speed">1x</div>
        </div>
        <div class="stat">
          <div class="label">长度</div>
          <div class="value" id="length">3</div>
        </div>
      </div>

      <div class="controls">
        <button class="primary" id="startBtn">开始 / 重新开始</button>
        <div class="row">
          <button id="pauseBtn">暂停</button>
          <button id="soundBtn">音效：开</button>
        </div>
      </div>

      <p class="tips">方向键或 WASD 控制移动，空格暂停。吃到黄色食物会加分并加速，撞墙或撞到自己就结束。</p>

      <div class="pad" aria-label="屏幕方向键">
        <button class="up" data-dir="up" aria-label="上">↑</button>
        <button class="left" data-dir="left" aria-label="左">←</button>
        <button class="right" data-dir="right" aria-label="右">→</button>
        <button class="down" data-dir="down" aria-label="下">↓</button>
      </div>
    </aside>
  </main>

  <div class="overlay" id="overlay">
    <div class="dialog">
      <h2 id="overlayTitle">游戏结束</h2>
      <p id="overlayText">你的得分是 0</p>
      <button class="primary" id="againBtn">再来一局</button>
    </div>
  </div>

  <script>
    const canvas = document.querySelector("#board");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.querySelector("#score");
    const bestEl = document.querySelector("#best");
    const speedEl = document.querySelector("#speed");
    const lengthEl = document.querySelector("#length");
    const statusEl = document.querySelector("#status");
    const startBtn = document.querySelector("#startBtn");
    const pauseBtn = document.querySelector("#pauseBtn");
    const soundBtn = document.querySelector("#soundBtn");
    const overlay = document.querySelector("#overlay");
    const overlayTitle = document.querySelector("#overlayTitle");
    const overlayText = document.querySelector("#overlayText");
    const againBtn = document.querySelector("#againBtn");

    const size = 24;
    const cells = canvas.width / size;
    const directions = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let best = Number(localStorage.getItem("snakeBest") || 0);
    let tickMs;
    let timer;
    let running = false;
    let paused = false;
    let soundOn = true;
    let audioCtx;

    bestEl.textContent = best;
    resetState();
    draw();

    function resetState() {
      snake = [
        { x: 10, y: 12 },
        { x: 9, y: 12 },
        { x: 8, y: 12 }
      ];
      direction = directions.right;
      nextDirection = directions.right;
      score = 0;
      tickMs = 150;
      food = makeFood();
      paused = false;
      updatePanel();
      statusEl.textContent = "按开始进入游戏";
      pauseBtn.textContent = "暂停";
    }

    function startGame() {
      clearInterval(timer);
      resetState();
      running = true;
      overlay.classList.remove("show");
      statusEl.textContent = "游戏中";
      timer = setInterval(step, tickMs);
      draw();
    }

    function step() {
      if (!running || paused) return;

      direction = nextDirection;
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (hitWall(head) || hitSnake(head)) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        beep(660, .07);
        food = makeFood();
        speedUp();
      } else {
        snake.pop();
      }

      updatePanel();
      draw();
    }

    function speedUp() {
      const next = Math.max(68, 150 - Math.floor(score / 40) * 12);
      if (next !== tickMs) {
        tickMs = next;
        clearInterval(timer);
        timer = setInterval(step, tickMs);
      }
    }

    function endGame() {
      running = false;
      clearInterval(timer);
      beep(180, .16);
      if (score > best) {
        best = score;
        localStorage.setItem("snakeBest", best);
      }
      updatePanel();
      statusEl.textContent = "游戏结束";
      overlayTitle.textContent = score >= best && score > 0 ? "新纪录！" : "游戏结束";
      overlayText.textContent = `你的得分是 ${score}`;
      overlay.classList.add("show");
      draw();
    }

    function togglePause() {
      if (!running) return;
      paused = !paused;
      pauseBtn.textContent = paused ? "继续" : "暂停";
      statusEl.textContent = paused ? "已暂停" : "游戏中";
      draw();
    }

    function setDirection(name) {
      const wanted = directions[name];
      if (!wanted) return;
      const reversing = wanted.x + direction.x === 0 && wanted.y + direction.y === 0;
      if (!reversing) nextDirection = wanted;
    }

    function makeFood() {
      let next;
      do {
        next = {
          x: Math.floor(Math.random() * cells),
          y: Math.floor(Math.random() * cells)
        };
      } while (snake.some(part => part.x === next.x && part.y === next.y));
      return next;
    }

    function hitWall(point) {
      return point.x < 0 || point.x >= cells || point.y < 0 || point.y >= cells;
    }

    function hitSnake(point) {
      return snake.some(part => part.x === point.x && part.y === point.y);
    }

    function updatePanel() {
      scoreEl.textContent = score;
      bestEl.textContent = best;
      lengthEl.textContent = snake.length;
      speedEl.textContent = `${(150 / tickMs).toFixed(1)}x`;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawFood();
      drawSnake();

      if (paused) {
        ctx.fillStyle = "rgba(5, 7, 10, .58)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#f4f7fb";
        ctx.font = "700 42px Segoe UI, Microsoft YaHei, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("已暂停", canvas.width / 2, canvas.height / 2);
      }
    }

    function drawGrid() {
      ctx.fillStyle = "#0b0f14";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "rgba(255, 255, 255, .035)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= cells; i++) {
        const p = i * size + .5;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(canvas.width, p);
        ctx.stroke();
      }
    }

    function drawFood() {
      const x = food.x * size;
      const y = food.y * size;
      ctx.fillStyle = "#ffcf45";
      ctx.beginPath();
      ctx.arc(x + size / 2, y + size / 2, size * .34, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "rgba(255, 255, 255, .35)";
      ctx.beginPath();
      ctx.arc(x + size * .42, y + size * .38, size * .1, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawSnake() {
      snake.forEach((part, index) => {
        const x = part.x * size;
        const y = part.y * size;
        const isHead = index === 0;
        ctx.fillStyle = isHead ? "#45d483" : "#2fc06f";
        roundRect(x + 2, y + 2, size - 4, size - 4, 6);
        ctx.fill();

        if (isHead) {
          ctx.fillStyle = "#07120c";
          const eyeY = y + size * .35;
          ctx.beginPath();
          ctx.arc(x + size * .35, eyeY, 2.4, 0, Math.PI * 2);
          ctx.arc(x + size * .65, eyeY, 2.4, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function roundRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function beep(freq, duration) {
      if (!soundOn) return;
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      oscillator.frequency.value = freq;
      oscillator.type = "square";
      gain.gain.setValueAtTime(.045, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + duration);
      oscillator.connect(gain);
      gain.connect(audioCtx.destination);
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + duration);
    }

    startBtn.addEventListener("click", startGame);
    againBtn.addEventListener("click", startGame);
    pauseBtn.addEventListener("click", togglePause);
    soundBtn.addEventListener("click", () => {
      soundOn = !soundOn;
      soundBtn.textContent = `音效：${soundOn ? "开" : "关"}`;
    });

    document.querySelectorAll("[data-dir]").forEach(button => {
      button.addEventListener("click", () => setDirection(button.dataset.dir));
    });

    window.addEventListener("keydown", event => {
      const keyMap = {
        ArrowUp: "up",
        w: "up",
        W: "up",
        ArrowDown: "down",
        s: "down",
        S: "down",
        ArrowLeft: "left",
        a: "left",
        A: "left",
        ArrowRight: "right",
        d: "right",
        D: "right"
      };

      if (event.code === "Space") {
        event.preventDefault();
        togglePause();
        return;
      }

      const dir = keyMap[event.key];
      if (dir) {
        event.preventDefault();
        setDirection(dir);
      }
    });
  </script>
</body>
</html>
